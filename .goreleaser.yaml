version: 2
project_name: diffmantic

before:
  hooks:
    - go mod tidy

builds:
  - id: diffmantic
    main: ./cmd/diffm
    binary: diffm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: diffmantic-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "🚀 Features"
      regexp: '^feat(\(.*\))??:'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^fix(\(.*\))??:'
      order: 1
    - title: "⚡ Performance Improvements"
      regexp: '^perf(\(.*\))??:'
      order: 2
    - title: "🛠️ Refactoring"
      regexp: '^refactor(\(.*\))??:'
      order: 3
    - title: "📝 Other Changes"
      order: 999
