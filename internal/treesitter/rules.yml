go:
  flattened:
    - interpreted_string_literal
  aliased:
    # Keywords
    "if": "condition_declaration"
    "for": "for"
    "return": "return"
    "switch": "switch"
    "select": "select"
    "case": "case"
    "default": "default"
    "go": "go"
    "defer": "defer"
    "var": "var"
    "const": "const"
    "type": "type"
    "struct": "struct"
    "interface": "interface"
    "func": "func"
    "package": "package"
    "import": "import"
    "map": "map"
    "chan": "chan"
    "break": "break"
    "continue": "continue"
    "range": "range"
    "fallthrough": "fallthrough"
    "else": "else"

    # Punctuation
    "(": "opening_paren"
    ")": "closing_paren"

    # Arithmetic operators
    "+": arithmetic_operator_literal
    "-": arithmetic_operator_literal
    "*": arithmetic_operator_literal
    "/": arithmetic_operator_literal
    "%": arithmetic_operator_literal

    # Comparison operators
    "==": comparison_operator_literal
    "!=": comparison_operator_literal
    "<": comparison_operator_literal
    "<=": comparison_operator_literal
    ">": comparison_operator_literal
    ">=": comparison_operator_literal

    # Logical operators
    "&&": logical_operator_literal
    "||": logical_operator_literal

    # Assignment operators
    "=": assignment_operator_literal
    ":=": assignment_operator_literal
    "+=": assignment_operator_literal
    "-=": assignment_operator_literal
    "*=": assignment_operator_literal
    "/=": assignment_operator_literal
    "%=": assignment_operator_literal
    "&=": assignment_operator_literal
    "|=": assignment_operator_literal
    "^=": assignment_operator_literal
    "<<=": assignment_operator_literal
    ">>=": assignment_operator_literal
    "&^=": assignment_operator_literal

    # Bitwise and other operators
    "&": bitwise_operator_literal
    "|": bitwise_operator_literal
    "^": bitwise_operator_literal
    "<<": bitwise_operator_literal
    ">>": bitwise_operator_literal
    "&^": bitwise_operator_literal

    # Unary/Channel operators
    "!": unary_operator_literal
    "<-": channel_operator_literal

    # Increment/Decrement operators
    "++": update_operator_literal
    "--": update_operator_literal
  ignored:
    - "\n"
    - "{"
    - "}"
    - "["
    - "]"
    - "."
    - ":"
    - ","
    - ";"
  label_ignored: []
  scaffolding:
    - source_file
    - block
    - argument_list
    - parameter_list
    - parenthesized_expression
    - expression_list
    - literal_value
    - statement_list
    - import_spec_list
    - function_declaration
    - method_declaration
    - if_statement
    - for_statement
    - expression_switch_statement
    - type_switch_statement
    - select_statement
    - select_case
    - communication_case
    - default_case
    - expression_case
    - type_case
python:
  flattened:
    - string
  aliased:
    "==": comparison_operator_literal
    "<=": comparison_operator_literal
    ">=": comparison_operator_literal
    "!=": comparison_operator_literal
    "<": comparison_operator_literal
    ">": comparison_operator_literal
    "<>": comparison_operator_literal
    "and": logical_operator_literal
    "or": logical_operator_literal
    "augmented_assignment": assignment
    "=": assignment_operator_literal
    "-=": assignment_operator_literal
    "+=": assignment_operator_literal
    "*=": assignment_operator_literal
    "/=": assignment_operator_literal
    "//=": assignment_operator_literal
    "%=": assignment_operator_literal
    "**=": assignment_operator_literal
    "is": is_operator
    "is not": is_not_operator

    # Arithmetic operators
    "+": arithmetic_operator_literal
    "-": arithmetic_operator_literal
    "*": arithmetic_operator_literal
    "/": arithmetic_operator_literal
    "//": arithmetic_operator_literal
    "%": arithmetic_operator_literal
    "**": arithmetic_operator_literal

    # Bitwise operators
    "&": bitwise_operator_literal
    "|": bitwise_operator_literal
    "^": bitwise_operator_literal
    "<<": bitwise_operator_literal
    ">>": bitwise_operator_literal

    # Unary operators
    "not": unary_operator_literal

    # Container keywords
    "def": "def"
    "try": "try"
    "for": "for"
    "if": "condition_declaration"
    "elif": "condition_declaration"
    "assert": "assert"
    "return": "return"
    "with": "with"
    "(": "opening_paren"
    ")": "closing_paren"
    "in": "in"

  ignored:
    - "{"
    - "}"
    - "["
    - "]"
    - "."
    - ":"
    - ","
    - "escape_sequence"
  label_ignored: []
  scaffolding:
    - module
    - block
    - argument_list
    - list_comprehension
    - parenthesized_expression
    - boolean_operator
    - expression_list
    - pattern_list
    - list
    - dictionary
    - for_in_clause
    - parameters
    - try_statement
    - except_clause
    - finally_clause
    - function_definition
    - class_definition
    - with_statement
    - for_statement
    - while_statement
    - if_statement
    - elif_clause
    - else_clause
